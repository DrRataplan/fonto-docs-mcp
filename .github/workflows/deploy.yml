name: Deploy to Cloud Run

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/781852272029/locations/global/workloadIdentityPools/github/providers/github
          service_account: github-actions@fonto-docs-mcp.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west4-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE=europe-west4-docker.pkg.dev/fonto-docs-mcp/fonto-docs/server
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy fonto-docs-mcp \
            --image="europe-west4-docker.pkg.dev/fonto-docs-mcp/fonto-docs/server:${{ github.sha }}" \
            --region=europe-west4 \
            --project=fonto-docs-mcp \
            --quiet
