name: Deploy to Cloud Run

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # semantic-release: push tags and create releases
      issues: write          # semantic-release: comment on issues
      pull-requests: write   # semantic-release: comment on PRs
      id-token: write        # OIDC: GCP Workload Identity + npm token exchange

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # semantic-release needs full git history

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/781852272029/locations/global/workloadIdentityPools/github/providers/github
          service_account: github-actions@fonto-docs-mcp.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west4-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE=europe-west4-docker.pkg.dev/fonto-docs-mcp/fonto-docs/server
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy fonto-docs-mcp \
            --image="europe-west4-docker.pkg.dev/fonto-docs-mcp/fonto-docs/server:${{ github.sha }}" \
            --region=europe-west4 \
            --project=fonto-docs-mcp \
            --quiet

      - name: Obtain short-lived npm token via OIDC
        run: |
          OIDC_TOKEN=$(curl -fsSL \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://token.actions.githubusercontent.com" \
            | jq -r '.value')
          NPM_TOKEN=$(curl -fsSL -X POST https://registry.npmjs.org/-/npm/v1/tokens/oidc \
            -H 'Content-Type: application/json' \
            -d "{\"oidcToken\":\"${OIDC_TOKEN}\"}" \
            | jq -r '.token')
          echo "::add-mask::$NPM_TOKEN"
          echo "NODE_AUTH_TOKEN=$NPM_TOKEN" >> "$GITHUB_ENV"

      - name: Release (semantic-release)
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

      - name: Notify Smithery
        run: |
          curl -s -X PATCH https://api.smithery.ai/servers/martinmiddel/fonto-docs \
            -H "Authorization: Bearer ${{ secrets.SMITHERY_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "displayName": "Fonto Docs MCP",
              "description": "Makes Fonto documentation accessible to AI tools. Fetches the underlying DITA XML and converts it to Markdown on demand — bypassing the JavaScript SPA.",
              "homepage": "https://fonto-docs.elliat.nl",
              "repositoryUrl": "https://github.com/DrRataplan/fonto-docs-mcp",
              "iconUrl": "https://fonto-docs.elliat.nl/favicon.svg",
              "license": "MIT"
            }'
